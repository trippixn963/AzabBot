[pytest]
# Skip tests that require external services in CI
markers =
    requires_openai: marks tests that require OpenAI API (deselect with '-m "not requires_openai"')
    requires_discord: marks tests that require Discord API (deselect with '-m "not requires_discord"')
    requires_database: marks tests that require database setup (deselect with '-m "not requires_database"')
    integration: marks integration tests (deselect with '-m "not integration"')

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio
asyncio_mode = auto