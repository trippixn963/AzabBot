name: Status Updates

on:
  issues:
    types: [opened, closed]
  pull_request:
    types: [opened, closed, merged]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Issue Status Notification
        if: github.event_name == 'issues'
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_SY }}"
          THREAD_ID="1404073613866438727"
          
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_URL="${{ github.event.issue.html_url }}"
          ISSUE_USER="${{ github.event.issue.user.login }}"
          ACTION="${{ github.event.action }}"
          
          # Clean title
          ISSUE_TITLE=$(echo "$ISSUE_TITLE" | head -c 200 | sed 's/"/\\"/g')
          
          if [ "$ACTION" = "opened" ]; then
            TITLE="🐛 New Issue Reported"
            COLOR=16744448  # Orange
            DESCRIPTION="Issue #${ISSUE_NUMBER}: **${ISSUE_TITLE}**\n\nReported by: **${ISSUE_USER}**"
          else
            TITLE="✅ Issue Resolved"
            COLOR=3066993   # Green
            DESCRIPTION="Issue #${ISSUE_NUMBER}: **${ISSUE_TITLE}**\n\nResolved by the development team"
          fi
          
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${TITLE}",
              "description": "${DESCRIPTION}\n\n[View Issue](${ISSUE_URL})",
              "color": ${COLOR},
              "url": "${ISSUE_URL}",
              "footer": {
                "text": "AzabBot Issue Tracker",
                "icon_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
              },
              "timestamp": "${TIMESTAMP}"
            }],
            "username": "AzabBot Status",
            "avatar_url": "https://github.com/${{ github.repository }}/raw/main/images/PFP.gif"
          }
          EOF
          )
          
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${WEBHOOK_URL}?thread_id=${THREAD_ID}"
      
