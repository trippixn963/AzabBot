name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.1)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Poetry
        uses: snok/install-poetry@v1
      
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            CURRENT_VERSION=$(poetry version -s)
            VERSION=$(poetry version ${{ github.event.inputs.release_type }} -s)
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing version: $VERSION"
      
      - name: Update version in pyproject.toml
        run: |
          poetry version ${{ steps.version.outputs.version }}
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add pyproject.toml
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
      
      - name: Update CHANGELOG.md
        run: |
          DATE=$(date +%Y-%m-%d)
          VERSION="${{ steps.version.outputs.version }}"
          
          # Add new version section to CHANGELOG
          cat > /tmp/changelog_new.md << EOF
          ## [$VERSION] - $DATE
          
          ### Added
          - New features in this release
          
          ### Changed
          - Changes in existing functionality
          
          ### Fixed
          - Bug fixes
          
          ### Security
          - Security updates
          
          EOF
          
          if [ -f "docs/project/CHANGELOG.md" ]; then
            cat docs/project/CHANGELOG.md >> /tmp/changelog_new.md
            mv /tmp/changelog_new.md docs/project/CHANGELOG.md
          else
            mv /tmp/changelog_new.md docs/project/CHANGELOG.md
          fi
          
          git add docs/project/CHANGELOG.md
          git commit -m "docs: update CHANGELOG for v$VERSION"
      
      - name: Push changes
        run: |
          git push origin main
      
      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  build-artifacts:
    name: Build Release Artifacts
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: "v${{ needs.prepare-release.outputs.version }}"
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Poetry
        uses: snok/install-poetry@v1
      
      - name: Build distributions
        run: |
          poetry build
      
      - name: Create source archive
        run: |
          tar czf "saydnayabot-${{ needs.prepare-release.outputs.version }}.tar.gz" \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='.mypy_cache' \
            --exclude='logs/*' \
            --exclude='data/*' \
            .
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: release-artifacts
          path: |
            dist/*
            saydnayabot-*.tar.gz

  publish:
    name: Publish Release
    needs: [prepare-release, build-artifacts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: "v${{ needs.prepare-release.outputs.version }}"
      
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: release-artifacts
          path: ./artifacts
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ needs.prepare-release.outputs.version }}"
          name: "SaydnayaBot v${{ needs.prepare-release.outputs.version }}"
          body: |
            ## 🚀 SaydnayaBot v${{ needs.prepare-release.outputs.version }}
            
            ### Installation
            
            #### Using Docker:
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME || 'yourusername' }}/saydnayabot:${{ needs.prepare-release.outputs.version }}
            ```
            
            #### From source:
            ```bash
            tar xzf saydnayabot-${{ needs.prepare-release.outputs.version }}.tar.gz
            cd saydnayabot-${{ needs.prepare-release.outputs.version }}
            poetry install
            ```
            
            ### What's Changed
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/v${{ needs.prepare-release.outputs.version }}/docs/project/CHANGELOG.md) for details.
            
            ---
            **Full Changelog**: https://github.com/${{ github.repository }}/compare/v1.0.0...v${{ needs.prepare-release.outputs.version }}
          files: |
            artifacts/*
          draft: false
          prerelease: false
      
      - name: Trigger deployment workflow
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: {
                environment: 'production'
              }
            })
      
      - name: Notify Discord - Release Published
        uses: sarisia/actions-status-discord@v1
        if: success()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          content: "@everyone"
          title: "🎉 SaydnayaBot v${{ needs.prepare-release.outputs.version }} Released!"
          description: |
            **Version:** `v${{ needs.prepare-release.outputs.version }}`
            **Release Type:** `${{ github.event.inputs.release_type }}`
            **Released by:** ${{ github.actor }}
            
            ## 📦 Installation Options
            
            ### 🐳 Docker
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME || 'yourusername' }}/saydnayabot:${{ needs.prepare-release.outputs.version }}
            ```
            
            ### 📥 Direct Download
            [Download Release Assets](https://github.com/${{ github.repository }}/releases/tag/v${{ needs.prepare-release.outputs.version }})
            
            ### 📝 What's New
            View the full [changelog](https://github.com/${{ github.repository }}/blob/v${{ needs.prepare-release.outputs.version }}/docs/project/CHANGELOG.md) for details.
            
            ## 🚀 Deployment
            Automatic deployment to production has been triggered.
          color: 0x7289da
          image: https://github.com/${{ github.repository }}/raw/main/images/PFP.gif
          url: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.prepare-release.outputs.version }}
          username: Azab Releases
          avatar_url: https://github.com/${{ github.repository }}/raw/main/images/PFP.gif