name: Push Notifications

on:
  push:
    branches: [ main ]
    # Optionally, notify for ALL branches:
    # branches: [ '**' ]

jobs:
  notify-push:
    name: Notify Push to Discord
    runs-on: ubuntu-latest
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Send Push Notification to Forum
        run: |
          # Forum thread ID
          THREAD_ID="1403930609348378624"
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK }}"
          
          # Extract commit info
          COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
          # Escape special characters and limit length
          COMMIT_MESSAGE=$(echo "$COMMIT_MESSAGE" | head -c 1000 | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
          
          # Determine if it's a merge
          if [[ "$COMMIT_MESSAGE" == Merge* ]]; then
            EMOJI="🔀"
            TITLE="Merge to ${{ github.ref_name }}"
          else
            EMOJI="📝"
            TITLE="New Commit to ${{ github.ref_name }}"
          fi
          
          # Count files changed
          FILES_ADDED="${{ github.event.head_commit.added || '0' }}"
          FILES_MODIFIED="${{ github.event.head_commit.modified || '0' }}"
          FILES_REMOVED="${{ github.event.head_commit.removed || '0' }}"
          
          # Create the JSON payload
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${EMOJI} ${TITLE}",
              "description": "**Author:** ${{ github.event.head_commit.author.name }}\n**Commit:** [\`${{ github.event.head_commit.id }}\`](${{ github.event.head_commit.url }})\n\n**Message:**\n\`\`\`\n${COMMIT_MESSAGE}\n\`\`\`",
              "color": 7506394,
              "timestamp": "${{ github.event.head_commit.timestamp }}",
              "url": "${{ github.event.head_commit.url }}",
              "footer": {
                "text": "Azab Repository",
                "icon_url": "https://github.com/${{ github.repository }}/raw/main/images/PFP.gif"
              },
              "fields": [
                {
                  "name": "Branch",
                  "value": "\`${{ github.ref_name }}\`",
                  "inline": true
                },
                {
                  "name": "Pusher",
                  "value": "${{ github.pusher.name }}",
                  "inline": true
                },
                {
                  "name": "Commits",
                  "value": "${{ github.event.commits && github.event.commits.length || '1' }}",
                  "inline": true
                }
              ]
            }],
            "username": "Azab Commits",
            "avatar_url": "https://github.com/${{ github.repository }}/raw/main/images/PFP.gif"
          }
          EOF
          )
          
          # Send to the forum thread
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "${WEBHOOK_URL}?thread_id=${THREAD_ID}")
          
          if [ "$response" -eq 204 ]; then
            echo "✅ Push notification sent to forum thread"
          else
            echo "⚠️ Push notification failed with status: $response"
          fi
      
      # Optional: Quick CI status check
      - name: Quick Syntax Check
        if: success()
        run: |
          echo "📋 Quick checks can be added here if needed"
          # Could add quick linting, file validation, etc.