name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
    
    - name: Install dependencies
      run: poetry install --no-interaction
    
    - name: Check black version
      run: poetry run black --version
    
    - name: Run black
      run: poetry run black --check src/
      continue-on-error: true
    
    - name: Run isort
      run: poetry run isort --check-only src/
    
    - name: Run flake8
      run: poetry run flake8 src/ --max-line-length=88 --extend-ignore=E203,E501,W503,F824
    
    - name: Run ruff
      run: poetry run ruff check src/
    
    - name: Run tests
      run: |
        poetry run pytest -v || true
      continue-on-error: true
      
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Bandit
      run: pip install bandit
    
    - name: Run Bandit Security Check
      run: bandit -r src/ -ll -i