name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
    
    - name: Install dependencies
      run: poetry install --no-interaction
    
    - name: Check black version
      run: poetry run black --version
    
    - name: Run black
      run: poetry run black --check src/
    
    - name: Run isort
      run: poetry run isort --check-only src/
    
    - name: Run flake8
      run: poetry run flake8 src/ --max-line-length=88 --extend-ignore=E203,E501,W503,F824
    
    - name: Run ruff
      run: poetry run ruff check src/
    
    - name: Run tests with coverage
      run: |
        poetry run pytest -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Notify Discord - Tests
      uses: sarisia/actions-status-discord@v1
      if: always()
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        title: "🧪 CI Tests - ${{ job.status == 'success' && 'Passed ✅' || 'Failed ❌' }}"
        description: |
          **Repository:** `${{ github.repository }}`
          **Branch:** `${{ github.ref_name }}`
          **Commit:** [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Author:** ${{ github.actor }}
          
          **Test Results:** ${{ job.status == 'success' && '✅ All tests passed' || '❌ Tests failed' }}
          **Coverage Report:** ${{ job.status == 'success' && '📊 Coverage report generated' || '⚠️ Coverage unavailable' }}
        color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}
        url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        username: SaydnayaBot CI
        avatar_url: https://github.com/${{ github.repository }}/raw/main/docs/setup/avatar.png
      
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Bandit
      run: pip install bandit
    
    - name: Run Bandit Security Check
      run: bandit -r src/ -ll -i --skip B101
    
    - name: Notify Discord - Security
      uses: sarisia/actions-status-discord@v1
      if: always()
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        title: "🔒 Security Scan - ${{ job.status == 'success' && 'Clean ✅' || 'Issues Found ⚠️' }}"
        description: |
          **Repository:** `${{ github.repository }}`
          **Branch:** `${{ github.ref_name }}`
          **Scan Type:** Bandit Security Check
          
          **Results:** ${{ job.status == 'success' && '✅ No security vulnerabilities detected' || '⚠️ Security issues found - review required' }}
          
          ${{ job.status != 'success' && '**Action Required:** Please review the security findings and address any vulnerabilities.' || '' }}
        color: ${{ job.status == 'success' && '0x00ff00' || '0xffaa00' }}
        url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        username: SaydnayaBot Security
        avatar_url: https://github.com/${{ github.repository }}/raw/main/docs/setup/avatar.png