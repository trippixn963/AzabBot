name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true
    
    - name: Install dependencies
      run: poetry install --no-interaction
    
    - name: Check black version
      run: poetry run black --version
    
    - name: Run black
      run: poetry run black --check src/
    
    - name: Run isort
      run: poetry run isort --check-only src/
    
    - name: Run flake8
      run: poetry run flake8 src/ --max-line-length=88 --extend-ignore=E203,E501,W503,F824
    
    - name: Run ruff
      run: poetry run ruff check src/
    
    - name: Run tests with coverage
      run: |
        poetry run pytest -v --cov=src --cov-report=xml --cov-report=term-missing
    
    - name: Notify Discord Forum - Tests
      if: always()
      run: |
        # Forum thread ID
        THREAD_ID="1403930609348378624"
        WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK }}"
        
        # Determine status
        if [ "${{ job.status }}" == "success" ]; then
          STATUS_EMOJI="✅"
          COLOR="3066993"
          STATUS_TEXT="Passed"
        else
          STATUS_EMOJI="❌"
          COLOR="15158332"
          STATUS_TEXT="Failed"
        fi
        
        # Create the JSON payload
        PAYLOAD=$(cat <<EOF
        {
          "embeds": [{
            "title": "🧪 CI Tests - ${STATUS_TEXT} ${STATUS_EMOJI}",
            "description": "**Repository:** \`${{ github.repository }}\`\n**Branch:** \`${{ github.ref_name }}\`\n**Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})\n**Author:** ${{ github.actor }}\n\n**Test Results:** ${STATUS_EMOJI} All tests ${STATUS_TEXT}\n**Coverage:** ${{ job.status == 'success' && '📊 Coverage report generated' || '⚠️ Coverage unavailable' }}",
            "color": ${COLOR},
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "footer": {
              "text": "Azab CI",
              "icon_url": "https://github.com/${{ github.repository }}/raw/main/images/PFP.gif"
            },
            "fields": [
              {
                "name": "Workflow",
                "value": "${{ github.workflow }}",
                "inline": true
              },
              {
                "name": "Run Number",
                "value": "#${{ github.run_number }}",
                "inline": true
              },
              {
                "name": "Python Version",
                "value": "${{ matrix.python-version }}",
                "inline": true
              }
            ]
          }],
          "username": "Azab CI",
          "avatar_url": "https://github.com/${{ github.repository }}/raw/main/images/PFP.gif"
        }
        EOF
        )
        
        # Send to the forum thread
        response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "${WEBHOOK_URL}?thread_id=${THREAD_ID}")
        
        if [ "$response" -eq 204 ]; then
          echo "✅ Discord notification sent to forum thread"
        else
          echo "⚠️ Discord notification failed with status: $response"
        fi
      
  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install Bandit
      run: pip install bandit
    
    - name: Run Bandit Security Check
      run: bandit -r src/ -ll -i --skip B101
    
    - name: Notify Discord Forum - Security
      if: always()
      run: |
        # Forum thread ID
        THREAD_ID="1403930609348378624"
        WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK }}"
        
        # Determine status
        if [ "${{ job.status }}" == "success" ]; then
          STATUS_EMOJI="✅"
          COLOR="3066993"
          STATUS_TEXT="Clean"
          RESULT_TEXT="✅ No security vulnerabilities detected"
        else
          STATUS_EMOJI="⚠️"
          COLOR="16776960"
          STATUS_TEXT="Issues Found"
          RESULT_TEXT="⚠️ Security issues found - review required\n\n**Action Required:** Please review the security findings and address any vulnerabilities."
        fi
        
        # Create the JSON payload
        PAYLOAD=$(cat <<EOF
        {
          "embeds": [{
            "title": "🔒 Security Scan - ${STATUS_TEXT} ${STATUS_EMOJI}",
            "description": "**Repository:** \`${{ github.repository }}\`\n**Branch:** \`${{ github.ref_name }}\`\n**Scan Type:** Bandit Security Check\n\n**Results:** ${RESULT_TEXT}",
            "color": ${COLOR},
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
            "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "footer": {
              "text": "Azab Security",
              "icon_url": "https://github.com/${{ github.repository }}/raw/main/images/PFP.gif"
            }
          }],
          "username": "Azab Security",
          "avatar_url": "https://github.com/${{ github.repository }}/raw/main/images/PFP.gif"
        }
        EOF
        )
        
        # Send to the forum thread
        response=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD" \
          "${WEBHOOK_URL}?thread_id=${THREAD_ID}")
        
        if [ "$response" -eq 204 ]; then
          echo "✅ Discord notification sent to forum thread"
        else
          echo "⚠️ Discord notification failed with status: $response"
        fi