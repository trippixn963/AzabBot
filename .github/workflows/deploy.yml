name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      
      - name: Install dependencies
        run: poetry install --no-interaction
      
      - name: Run tests with coverage
        run: poetry run pytest -v --cov=src --cov-report=xml --cov-report=term-missing
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: true

  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        if: github.event_name == 'push' || github.event.inputs.environment == 'production'
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/saydnayabot
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name == 'push' || github.event.inputs.environment == 'production' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3
      
      - name: Extract release notes
        id: extract_notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          
          # Extract release notes from CHANGELOG.md
          if [ -f "docs/project/CHANGELOG.md" ]; then
            NOTES=$(awk "/## \[$VERSION\]/{flag=1; next} /## \[/{flag=0} flag" docs/project/CHANGELOG.md)
            echo "NOTES<<EOF" >> $GITHUB_OUTPUT
            echo "$NOTES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "NOTES=No release notes available" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: SaydnayaBot ${{ steps.extract_notes.outputs.VERSION }}
          body: |
            ## Docker Image
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/saydnayabot:${{ steps.extract_notes.outputs.VERSION }}
            ```
            
            ## Release Notes
            ${{ steps.extract_notes.outputs.NOTES }}
            
            ## Installation
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for installation instructions.
          draft: false
          prerelease: false
      
      - name: Notify Discord - Release Created
        uses: sarisia/actions-status-discord@v1
        if: success()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          content: "@everyone"
          title: "📦 New Release: SaydnayaBot ${{ steps.extract_notes.outputs.VERSION }}"
          description: |
            **Version:** `${{ steps.extract_notes.outputs.VERSION }}`
            **Release Page:** [View on GitHub](https://github.com/${{ github.repository }}/releases/tag/${{ steps.extract_notes.outputs.VERSION }})
            
            ## 🐳 Quick Start
            ```bash
            docker pull ${{ secrets.DOCKER_USERNAME }}/saydnayabot:${{ steps.extract_notes.outputs.VERSION }}
            ```
            
            ## 📝 Highlights
            Check the [release notes](https://github.com/${{ github.repository }}/releases/tag/${{ steps.extract_notes.outputs.VERSION }}) for what's new!
          color: 0x7289da
          url: https://github.com/${{ github.repository }}/releases/tag/${{ steps.extract_notes.outputs.VERSION }}
          username: Azab Releases
          avatar_url: https://github.com/${{ github.repository }}/raw/main/images/PFP.gif

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    needs: [test, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DOCKER_IMAGE: ${{ needs.build.outputs.image-tag }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
        run: |
          # This is a placeholder for actual deployment
          # In a real scenario, you would:
          # 1. SSH to your server
          # 2. Pull the new Docker image
          # 3. Stop the old container
          # 4. Start the new container with environment variables
          # 5. Health check the deployment
          
          echo "Deploying $DOCKER_IMAGE to ${{ github.event.inputs.environment || 'production' }}"
          echo "Deployment steps would go here"
          
          # Example deployment script (commented out):
          # echo "$DEPLOY_KEY" > deploy_key
          # chmod 600 deploy_key
          # ssh -i deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST << EOF
          #   docker pull $DOCKER_IMAGE
          #   docker stop saydnayabot || true
          #   docker rm saydnayabot || true
          #   docker run -d \
          #     --name saydnayabot \
          #     --restart unless-stopped \
          #     -e DISCORD_TOKEN=$DISCORD_TOKEN \
          #     -e OPENAI_API_KEY=$OPENAI_API_KEY \
          #     -e DEVELOPER_ID=$DEVELOPER_ID \
          #     $DOCKER_IMAGE
          # EOF

  notify:
    name: Notify Deployment
    needs: [deploy, test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Discord - Deployment Status
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          content: ${{ needs.deploy.result != 'success' && '@here' || '' }}
          title: "🚀 Deployment to ${{ github.event.inputs.environment || 'Production' }} - ${{ needs.deploy.result == 'success' && 'Successful ✅' || needs.deploy.result == 'failure' && 'Failed ❌' || 'Skipped ⏭️' }}"
          description: |
            **Repository:** `${{ github.repository }}`
            **Environment:** `${{ github.event.inputs.environment || 'production' }}`
            **Version:** `${{ github.ref_name }}`
            **Triggered by:** ${{ github.actor }}
            **Trigger:** ${{ github.event_name == 'workflow_dispatch' && 'Manual Deployment' || 'Tag Push' }}
            
            ## 📊 Pipeline Status
            | Stage | Status |
            |-------|--------|
            | 🧪 Tests | ${{ needs.test.result == 'success' && '✅ Passed' || needs.test.result == 'failure' && '❌ Failed' || '⏭️ Skipped' }} |
            | 🔨 Build | ${{ needs.build.result == 'success' && '✅ Completed' || needs.build.result == 'failure' && '❌ Failed' || '⏭️ Skipped' }} |
            | 🚀 Deploy | ${{ needs.deploy.result == 'success' && '✅ Deployed' || needs.deploy.result == 'failure' && '❌ Failed' || '⏭️ Skipped' }} |
            
            ${{ needs.build.outputs.image-tag && format('## 🐳 Docker Image\n```\n{0}\n```', needs.build.outputs.image-tag) || '' }}
            
            ${{ needs.deploy.result != 'success' && '## ⚠️ Action Required\nDeployment failed. Please check the logs and retry if necessary.' || '## ✅ Deployment Complete\nThe application has been successfully deployed and is now running.' }}
          color: ${{ needs.deploy.result == 'success' && '0x00ff00' || needs.deploy.result == 'failure' && '0xff0000' || '0xffaa00' }}
          url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          username: Azab Deploy
          avatar_url: https://github.com/${{ github.repository }}/raw/main/images/PFP.gif