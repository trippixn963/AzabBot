name: Discord Forum Notifications

on:
  workflow_call:
    inputs:
      title:
        required: true
        type: string
      message:
        required: true
        type: string
      thread_name:
        required: false
        type: string
        default: ''
      color:
        required: false
        type: string
        default: '3447003'
      status:
        required: false
        type: string
        default: 'info'
    secrets:
      DISCORD_WEBHOOK:
        required: true
      DISCORD_FORUM_THREAD_ID:
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send to Discord Forum
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
          THREAD_ID: ${{ secrets.DISCORD_FORUM_THREAD_ID }}
        run: |
          # Prepare the JSON payload
          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${{ inputs.title }}",
              "description": "${{ inputs.message }}",
              "color": ${{ inputs.color }},
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
              "footer": {
                "text": "SaydnayaBot CI/CD"
              }
            }],
            "username": "SaydnayaBot",
            "avatar_url": "https://github.com/${{ github.repository }}/raw/main/docs/setup/avatar.png"
          }
          EOF
          )
          
          # Determine the webhook URL (with or without thread_id)
          if [ -n "$THREAD_ID" ]; then
            # Post to specific thread in forum
            WEBHOOK_ENDPOINT="${WEBHOOK_URL}?thread_id=${THREAD_ID}"
          elif [ -n "${{ inputs.thread_name }}" ]; then
            # Create new thread in forum with specific name
            PAYLOAD=$(cat <<EOF
          {
            "thread_name": "${{ inputs.thread_name }}",
            "embeds": [{
              "title": "${{ inputs.title }}",
              "description": "${{ inputs.message }}",
              "color": ${{ inputs.color }},
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)",
              "footer": {
                "text": "SaydnayaBot CI/CD"
              }
            }],
            "username": "SaydnayaBot",
            "avatar_url": "https://github.com/${{ github.repository }}/raw/main/docs/setup/avatar.png"
          }
          EOF
          )
            WEBHOOK_ENDPOINT="${WEBHOOK_URL}"
          else
            # Regular webhook post (will create new thread if in forum)
            WEBHOOK_ENDPOINT="${WEBHOOK_URL}"
          fi
          
          # Send the webhook
          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$WEBHOOK_ENDPOINT"